[pytest]
# Tier markers for the fleet test suite (SPEC §12).
#   unit  -> registry/parser/prompt tests, no claude (fast, default CI tier)
#   hooks -> bin/hooks/*.py subprocess + claim-race tests, no claude
#   live  -> tier-3 live-integration harness, gated on FLEET_LIVE=1, spends
#            real haiku money in a temp FLEET_HOME sandbox (tests/integration/)
# tests/conftest.py auto-applies these by file so no per-test edits are needed.
markers =
    unit: no-claude unit tier (registry, parsers, prompt composition, liveness)
    hooks: no-claude hook-script subprocess tier (bin/hooks/*)
    live: tier-3 live-integration harness, gated on FLEET_LIVE=1 (real haiku spend)
